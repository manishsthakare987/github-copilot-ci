#run python test on push and pull request using github actions
name: Python application  

#trigger based on push on min branches and pull request 
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
               
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python 3.8
      uses: actions/setup-python@v2
      with:
        python-version: 3.8
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest
